# Level 3: GAD + mode tracking + Eckart projection + adaptive dt
method: gad_adaptive_dt
n_steps: 300
dt: 0.005
k_track: 8
beta: 1.0
use_projection: true
use_adaptive_dt: true
dt_min: 1e-5
dt_max: 0.1
dt_adaptation: eigenvalue_clamped
max_atom_disp: 0.35
min_interatomic_dist: 0.4
force_threshold: 0.01
force_criterion: fmax
purify_hessian: false
