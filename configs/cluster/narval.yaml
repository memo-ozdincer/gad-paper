# Narval (Calcul Québec) — A100-40GB with MIG slicing
#
# HIP inference on small molecules: sequential, <2GB VRAM, GPU-bound but
# not compute-bound. Full A100 would sit 95% idle. MIG slices give same
# per-job throughput with much faster queue dispatch.
#
# Narval policy: min 1h jobs, max 7 days, max 1000 queued.
# GPU nodes: 159 × 4 A100-SXM4-40GB, 48 cores/node, 498GB RAM.
# MIG nodes are often idle — batch MIG jobs start within minutes.
#
# Interactive salloc has ~3hr wait (small pool). Use sbatch instead.

account: rrg-aspuru
gpus: "a100_2g.10gb:1"   # MIG slice: 10GB VRAM, 2/8 compute — plenty for HIP
cpus_per_task: 4          # 4 cores: 1 for main loop, rest for torch/data
mem_gb: 16                # Dataset + model + trajectory buffer
time_min: 360             # 6 hours

omp_num_threads: 1        # BLAS single-threaded
torch_num_threads: 2      # Intra-op: 2 is enough for MIG slice

modules:
  - StdEnv/2023
  - python/3.11
  - cuda/12.6

# Narval Lustre paths
project_dir: /lustre06/project/6033559/memoozd
scratch_dir: /lustre07/scratch/memoozd
